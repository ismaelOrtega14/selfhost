version: "3.8"
services:
  mealie:
    image: ghcr.io/mealie-recipes/mealie:latest
    ports:
      - target: 9000
        published: 9925
        protocol: tcp
    deploy:
      replicas: 1
      restart_policy:
        condition: on-failure
      resources:
        limits:
          memory: 1000M
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:9000/api/app/about || exit 1"]
      interval: 300s  # 5 minutos en lugar de 30 segundos
      timeout: 5s
      retries: 3
      start_period: 60s
    volumes:
      - /home/ismael/mealie/data:/app/data/
    secrets:
      - mealie_db
      - mealie_openId
    env_file:
      - stack.env

secrets:
  mealie_db:
    external: true
  mealie_openId:
    external: true

    

