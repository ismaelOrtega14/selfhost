version: "3.9"
services:
  n8n:
    image: docker.n8n.io/n8nio/n8n:latest
    volumes:
      - /home/ismael/n8n/n8n_data:/home/node/.n8n
    deploy:
      replicas: 1
      restart_policy:
        condition: on-failure
    ports:
      - target: 5678
        published: 5678
        protocol: tcp
    secrets:
      - n8n_pass
    env_file:
      - stack.env

secrets:
  n8n_pass:
    external: true



