version: "3.8"
services:
  mealie:
    image: ghcr.io/mealie-recipes/mealie:latest
    ports:
      - target: 9000
        published: 9925
        protocol: tcp
    deploy:
      replicas: 1
      restart_policy:
        condition: on-failure
      resources:
        limits:
          memory: 1000M
    healthcheck:
      test: ["CMD-SHELL", "timeout 10s bash -c ':> /dev/tcp/127.0.0.1/9000' || exit 1"]
      interval: 120s
      timeout: 15s
      retries: 3
      start_period: 30s
    volumes:
      - /home/ismael/mealie/data:/app/data/
    secrets:
      - mealie_db
      - mealie_openId
    env_file:
      - stack.env

secrets:
  mealie_db:
    external: true
  mealie_openId:
    external: true

    


