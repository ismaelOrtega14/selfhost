version: "3.8"
services:
  mealie:
    image: ghcr.io/mealie-recipes/mealie:latest
    ports:
      - target: 9000
        published: 9925
        protocol: tcp
    deploy:
      replicas: 1
      restart_policy:
        condition: on-failure
      resources:
        limits:
          memory: 1000M
    healthcheck:
      test: wget --no-verbose --tries=1 --spider http://localhost:9000/api/app/about || exit 1
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 30s
    volumes:
      - /home/ismael/mealie/data:/app/data/
    secrets:
      - mealie_db
      - mealie_openId
    env_file:
      - stack.env

secrets:
  mealie_db:
    external: true
  mealie_openId:
    external: true

    
